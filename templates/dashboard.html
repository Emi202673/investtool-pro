<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Optimization Desk</title>
</head>
<body style="font-family:Arial">

<h1>🏦 PORTFOLIO OPTIMIZATION DESK</h1>

<p>💰 Capital: {{ capital }}</p>

<hr>

<h2>📊 Optimal Allocation (Mean-Variance Proxy)</h2>

{% for p in portfolio %}
<div style="border:1px solid #ddd; padding:10px; margin:10px">

<b>{{ p.asset }}</b><br>

📈 Mean Return: {{ p.mean }}<br>
📉 Volatility: {{ p.vol }}<br>
⚖️ Weight: <b>{{ p.weight }}</b><br>

</div>
{% endfor %}

</body>
</html>
