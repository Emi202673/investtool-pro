<!DOCTYPE html>
<html>
<head>
    <title>Technical Trading Desk</title>
</head>
<body style="font-family:Arial">

<h1>📊 TECHNICAL TRADING DESK</h1>

<hr>

<h2>🧠 SIGNALS (RSI + MACD)</h2>

{% for s in signals %}
<div style="border:1px solid #ccc; padding:10px; margin:10px">

<b>{{ s.asset }}</b><br>
Price: {{ s.price }}<br>
RSI: {{ s.rsi }}<br>
MACD: {{ s.macd }}<br>
Signal: <b>{{ s.signal }}</b><br>

<form method="POST" action="/buy">
    <input type="hidden" name="asset" value="{{ s.asset }}">
    <button>BUY</button>
</form>

<form method="POST" action="/sell">
    <input type="hidden" name="asset" value="{{ s.asset }}">
    <button>SELL</button>
</form>

</div>
{% endfor %}

<hr>

<h2>💼 PORTFOLIO</h2>

{% for k, v in portfolio.items() %}
<p>{{ k }} → {{ v }} units</p>
{% endfor %}

</body>
</html>
