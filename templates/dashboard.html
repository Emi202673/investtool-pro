<!DOCTYPE html>
<html>
<head>
    <title>Trading Desk</title>
</head>

<body style="background:#0b0f14; color:white; font-family:Arial;">

<h1>🏦 TRADING DESK</h1>

<h2>📊 SIGNALS</h2>

{% for s in signals %}
<div style="margin:10px; padding:10px; background:#1f2937">

    <b>{{ s.asset }}</b><br>
    Price: {{ s.price }}<br>
    RSI: {{ s.rsi }}<br>

    {% if s.signal == "BUY" %}
        <span style="color:lime">🟢 BUY</span>
    {% elif s.signal == "SELL" %}
        <span style="color:red">🔴 SELL</span>
    {% else %}
        <span style="color:gray">⚪ HOLD</span>
    {% endif %}

    <form method="POST" action="/add">
        <input type="hidden" name="asset" value="{{ s.asset }}">
        <input type="number" name="qty" step="0.1">
        <button>ADD</button>
    </form>

    <form method="POST" action="/remove">
        <input type="hidden" name="asset" value="{{ s.asset }}">
        <input type="number" name="qty" step="0.1">
        <button>REMOVE</button>
    </form>

</div>
{% endfor %}

<h2>💼 PORTFOLIO</h2>

{% for k, v in portfolio.items() %}
<div>{{ k }} → {{ v }}</div>
{% endfor %}

</body>
</html>
